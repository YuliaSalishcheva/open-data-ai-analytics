name: Python CI Pipeline (Matrix)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску (або 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout code
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.module == 'all' || inputs.module == matrix.module }}
        uses: actions/checkout@v4

      # Крок Set up Python ВИДАЛЕНО! Використовуємо ваш локальний Python.

      - name: Install dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.module == 'all' || inputs.module == matrix.module }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ${{ matrix.module }}
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.module == 'all' || inputs.module == matrix.module }}
        # Змінено команду створення папки на кросплатформову (щоб працювало і на Linux, і на Windows)
        run: |
          python -c "import os; os.makedirs('artifacts/${{ matrix.module }}', exist_ok=True)"
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1

      - name: Upload Artifacts
        if: ${{ !cancelled() && (github.event_name != 'workflow_dispatch' || inputs.module == 'all' || inputs.module == matrix.module) }}
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}