name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Artifacts Directory
        run: mkdir -p artifacts

      - name: Run Data Loading
        run: python src/data_load.py > artifacts/load.log 2>&1

      - name: Run Analysis
        run: python src/data_quality_analysis.py > artifacts/analysis.log 2>&1

      - name: Run Data Research
        run: python src/data_research.py > artifacts/research.log 2>&1

      - name: Run Visualization
        run: python src/visualization.py > artifacts/viz.log 2>&1

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-reports
          path: artifacts/