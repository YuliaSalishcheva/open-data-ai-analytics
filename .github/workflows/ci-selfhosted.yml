name: CI (self-hosted)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  run-visualization-local:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System Check
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }

      - name: Run visualization module
        run: |
          # Створюємо папку для артефактів (PowerShell style)
          if (!(Test-Path "artifacts/visualization")) { New-Item -ItemType Directory -Force -Path "artifacts/visualization" }
          
          # Запускаємо модуль. Переконайся, що шлях src/visualization.py вірний
          # Якщо файл лежить в корені, приберіть "src/"
          python src/visualization.py > artifacts/visualization/run.log 2>&1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization-selfhosted
          path: artifacts/visualization